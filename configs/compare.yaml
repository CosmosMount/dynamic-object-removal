# Default config for `python -m object_removal.cli.compare`.
# Any CLI flag may override the matching YAML field.
#
# Task input:
# - `task` is required. Supports:
#     davis:SEQ            single sequence
#     davis:[s1,s2,...]    explicit list
#     davis:all            all sequences under davis_root/JPEGImages/480p/
#   Batch mode (list or all) writes per-seq results under out_root/<SEQ>/ and
#   a cross-sequence average at out_root/summary/combined_avg.{csv,md}.
# - `davis_root` is resolved relative to the repository root when not absolute.
# - Omit `out_root` to use the default `outputs/compare/<SEQ>`.

# task: davis:[bear,bmx-trees,gold-fish,cat-girl,scooter-board,kite-surf,tennis,hockey]
# task: davis:[scooter-board,bmx-trees]
task: video:walking1.mp4
# davis_root: data/DAVIS
out_root: outputs/wild-walking1

# Pipeline selection:
# - `pipelines_config` points to the registry file that defines `pipelines:`.
# - Use exactly one of `pipelines` or `run_all_pipelines`.
# - Uncomment `only_stage` to run one stage only.
# - For `only_stage: mask|track|inpaint`, exactly one pipeline id is required.
# - For `only_stage: eval`, multiple pipeline ids are allowed and only existing artifacts are read.

pipelines_config: configs/pipelines.yaml
pipelines:
#   - yolo_xmem
#   - yolo_sam3
    # - vggt4d_xmem
    # - vggt4d_sam3
    # - vggt4d_xmem_sam3_vote
  - vggt4d_xmem_sam3_vote_diffueraser
# run_all_pipelines: true
# only_stage: eval

# Output behavior:
# - `overwrite: true` clears existing outputs for the selected stage before rerunning it.
# - `export_mask_vis: true` writes `runs/<pipeline>/track/mask_vis.mp4` after track.
# - `mask_vis_fps` and `mask_vis_alpha` are optional overlay settings used only when mask video export is enabled.

overwrite: true
export_mask_vis: true
# mask_vis_fps: 10
# mask_vis_alpha: 0.5

# Runtime environment:
# - `part_label` is forwarded to downstream summaries.
# - `conda_exe` selects the conda executable used by compare.
# - `env_map` points to the method-to-conda-env mapping JSON.
# - `env_policy` is one of `auto`, `force_multi`, or `force_single`.

part_label: ""
conda_exe: conda
env_map: configs/env_map.json
env_policy: auto

# Optional: no-reference inpaint video quality via FastVQA (external repo).
eval:
  fast_vqa: true
#   fast_vqa_root: modules/FAST-VQA-and-FasterVQA   # relative to repo root; omit to auto-detect modules/... or use FAST_VQA_ROOT
#   fast_vqa_model: FasterVQA   # vqa.py -m
#   fast_vqa_device: cuda   # if subprocess crashes (e.g. rc=-11 SIGSEGV), try cpu or set FAST_VQA_PYTHON
#   fast_vqa_python: ""      # optional: path to python with fastvqa+decord; else FAST_VQA_PYTHON or current env
#   fast_vqa_fps: 24