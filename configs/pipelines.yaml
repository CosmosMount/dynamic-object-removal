# Pipeline registry for `compare`.
# Task-level selection (`task`, `pipelines`, `out_root`, `overwrite`, ...) lives in `configs/compare.yaml`.
#
# Each entry under `pipelines:` must define:
# - `mask`: mask-stage method id
# - `track`: track-stage method id
# - `inpaint`: inpaint-stage method id
#
# Optional stage-specific blocks under each pipeline are forwarded to the corresponding stage only.
# Shared module settings live under root `parameters:` (see below).
#
# Mask options (`vggt4d:`) for `mask: vggt4d` or `mask: vggt_framewise`:
#   dyn_threshold_scale: float      # Same meaning as object-removal `--dyn_threshold_scale`; smaller values keep more motion.
#   threshold: int                  # Binarize the dynamic mask with `arr > threshold`.
#   merge_all: bool                 # Merge all connected dynamic regions into one init mask.
#   split_cc: bool                  # Split the foreground into connected components / instance ids.
#   cc_min_area: int                # Drop tiny connected components below this area.
#   cc_max_objects: int             # Keep at most this many connected components.
#   cc_close_kernel: int            # Morphological closing kernel size; `0` disables it.
#   max_frames_for_vggt: int        # `vggt4d`: first N frames; `vggt_framewise`: uniform subsample cap.
#   vggt_chunk_size: int            # `vggt4d` chunk size for demo_vggt4d; `0` runs the whole clip in one chunk.
#   init_frame: int                 # `vggt4d` only: absolute frame index used for the init mask.
#   tail_policy: hold_last|zeros    # `vggt_framewise` only: how to fill frames without a sampled VGGT slot.
#
# Track options (`sam3:`) for `track: sam3`:
#   checkpoint: str                 # SAM3 checkpoint path; defaults to `ckpts/sam3/sam3.pt`.
#   two_stage_anchor_idx: auto|-1|int
#       Overlap-anchor: forward-only probe, mirrored reverse from last frame, max-overlap keyframe,
#       per-id intersection seed, then one full bidirectional propagate from anchor. `-1` = single
#       bidirectional pass from the original init mask only.
#   two_stage_auto_samples / two_stage_auto_* : deprecated (CLI compatibility only).
#   score_thresh: float
#
# Track options (`xmem:`) for `track: xmem`:
#   bidirectional: bool              # If true, enable overlap-anchor (same as non-off two_stage_anchor_idx).
#   bidirectional_merge: union|intersection  # Deprecated (ignored).
#   two_stage_anchor_idx: -1|auto|int   # `-1` off unless bidirectional; `auto` = max overlap; int = fixed anchor.
#   two_stage_auto_* : deprecated (kept for YAML compatibility).
#
# Inpaint options (`diffueraser:`) for `inpaint: diffueraser`:
#   video_length: int               # If omitted, compare uses `ceil(num_frames / 24)`.
#   mask_dilation_iter: int         # Dilate the hole before inpaint; larger values can swallow nearby background.
#   mask_hole_shrink_iters: int     # Erode the binary hole before packaging the mask video; set `0` to disable.
#   ref_stride: int                 # Reference-frame stride used by the ProPainter prior inside DiffuEraser.
#   neighbor_length: int            # Neighbor-frame count used by the ProPainter prior.
#   subvideo_length: int            # Optical-flow subclip length; lower values can reduce long-range artifacts.
#   max_img_size: int               # Long-edge cap before DiffuEraser (default 768). Lower (e.g. 640) if CUDA OOM.
#
# Inpaint options (`propainter:`) for `inpaint: propainter`:
#   resize_ratio: float             # Resize ratio before ProPainter inference.
#   subvideo_length: int
#   neighbor_length: int
#   raft_iter: int
#   fp16: bool
#   save_frames: bool
#
# Root-level `parameters:` (optional) — unified settings per integration module.
# - Keys must be a subset of `vggt4d`, `sam3`, `diffueraser`, `propainter`, `xmem`
#   (same names as optional blocks under each pipeline).
# - Merge is shallow: each pipeline’s own block overrides the same keys from `parameters`.
# - Under `pipelines:`, each entry can be reduced to `mask` / `track` / `inpaint` only.
# - `parameters.propainter` applies to every pipeline whose `inpaint` method is `propainter` unless overridden.
# - Legacy root key `defaults:` is still accepted for backward compatibility; `parameters` wins on duplicate keys.

parameters:
  vggt4d:
    dyn_threshold_scale: 0.7
    max_frames_for_vggt: 20
    threshold: 0
    merge_all: true
    split_cc: true
    cc_min_area: 32
    cc_max_objects: 64
    cc_close_kernel: 0
    vggt_chunk_size: 20
    tail_policy: hold_last
  sam3:
    checkpoint: ckpts/sam3/sam3.pt
    two_stage_anchor_idx: auto
    two_stage_auto_samples: 7
    two_stage_auto_max_fg_frac: 0.92
    two_stage_auto_min_fg_frac: 0.00008
    two_stage_auto_min_fg_pixels: 64
    score_thresh: 0.0
  diffueraser:
    # Omit `video_length` to keep the default `ceil(num_frames / 24)` behavior.
    mask_dilation_iter: 6
    max_img_size: 768
    ref_stride: 10
    neighbor_length: 10
    subvideo_length: 50
  propainter:
    resize_ratio: 0.75
    subvideo_length: 40
    neighbor_length: 8
    raft_iter: 12
    fp16: true
    save_frames: true
  xmem:
    bidirectional: true
    bidirectional_merge: vote
    bidirectional_vote_threshold: 0.3
    two_stage_anchor_idx: auto
    two_stage_min_overlap_ratio: 0.4
  vote_fusion:
    mode: intersection
    area_ratio_threshold: 1.5

pipelines:
  # Lightweight baseline: motion mask -> identity track -> handcrafted fill.
  baseline:
    mask: baseline_yolo_motion
    track: identity
    inpaint: baseline_handcrafted

  # YOLO init mask variants.
  yolo_sam3:
    mask: yolo_first
    track: sam3
    inpaint: propainter

  yolo_opt:
    mask: yolo_first
    track: optflow
    inpaint: propainter

  yolo_xmem:
    mask: yolo_first
    track: xmem
    inpaint: propainter  

  vggt4d:
    mask: vggt_framewise
    track: identity
    inpaint: propainter

  vggt4d_xmem:
    mask: vggt4d
    track: xmem
    inpaint: propainter

  vggt4d_sam3:
    mask: vggt4d
    track: sam3
    inpaint: propainter

  # Mask fusion: vote between xmem and sam3 tracked masks (run after vggt4d_xmem + vggt4d_sam3).
  vggt4d_xmem_sam3_vote:
    mask: vggt4d
    track: vote_fusion
    inpaint: propainter
    vote_fusion:
      from_pipelines: [vggt4d_xmem, vggt4d_sam3]
      mode: intersection

  vggt4d_xmem_sam3_vote_diffueraser:
    mask: vggt4d
    track: vote_fusion
    inpaint: diffueraser
    vote_fusion:
      from_pipelines: [vggt4d_xmem, vggt4d_sam3]
      mode: intersection
