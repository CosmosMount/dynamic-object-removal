    args:
      sample_types:
        fragments:
          fragments_h: 5
          fragments_w: 5
          fsize_h: 32
          fsize_w: 32
          aligned: 8
          clip_len: 32
          frame_interval: 2
          t_frag: 8
          num_clips: 1
