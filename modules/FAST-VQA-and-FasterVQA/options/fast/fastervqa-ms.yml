      fragments:
        checkpoint: false
        pretrained:
    backbone_size: swin_tiny_grpb
    backbone_preserve_keys: fragments
    divide_head: false
    vqa_head:
      in_channels: 768
      hidden_channels: 64
test_load_path: ../../ckpts/fastvqa/FAST_VQA_3D_1_1.pth
