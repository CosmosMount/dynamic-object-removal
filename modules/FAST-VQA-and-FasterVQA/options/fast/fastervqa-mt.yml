    args:
      sample_types:
        fragments:
          fragments_h: 7
          fragments_w: 7
          fsize_h: 32
          fsize_w: 32
          aligned: 8
          clip_len: 16
          frame_interval: 2
          t_frag: 4
          num_clips: 1
