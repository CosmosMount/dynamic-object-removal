name: FAST-VQA-M
data:
  val-kv1k:
    args:
      sample_types:
        fragments:
          fragments_h: 4
          fragments_w: 4
          fsize_h: 32
          fsize_w: 32
          aligned: 8
          clip_len: 16
          frame_interval: 2
          num_clips: 4
model:
  type: DiViDeAddEvaluator
  args:
    backbone:
      fragments:
        checkpoint: false
        pretrained:
    backbone_size: swin_tiny_grpb_m
    backbone_preserve_keys: fragments
    divide_head: false
    vqa_head:
      in_channels: 768
      hidden_channels: 64
test_load_path: ./pretrained_weights/FAST_VQA_M_1*4.pth
