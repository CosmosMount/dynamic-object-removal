# 将 page/ 部署为 GitHub Pages（仓库 Settings → Pages → Source 选 GitHub Actions）
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 不使用 configure-pages：在仓库从未启用过 Pages 时，该步骤会请求
      # GET /repos/.../pages 并返回 404。纯静态上传无需该步骤。
      - uses: actions/upload-pages-artifact@v3
        with:
          path: page
      - id: deployment
        uses: actions/deploy-pages@v4
